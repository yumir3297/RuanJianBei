<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="hero" x1="0" x2="1"><stop stop-color="#142B5F"/><stop offset="1" stop-color="#315FCC"/></linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#4E7EFF"/><stop offset="1" stop-color="#8456D9"/></linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#17365D" flood-opacity=".16"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#637991"/></marker>
    <style>.title{font:700 46px 'Microsoft YaHei','Noto Sans CJK SC',Arial;fill:#11233F}.sub{font:400 22px 'Microsoft YaHei','Noto Sans CJK SC',Arial;fill:#5A6E87}.cap{font:700 25px 'Microsoft YaHei','Noto Sans CJK SC',Arial;fill:#fff}.h{font:700 25px 'Microsoft YaHei','Noto Sans CJK SC',Arial;fill:#173454}.t{font:400 20px 'Microsoft YaHei','Noto Sans CJK SC',Arial;fill:#36506D}.small{font:400 18px 'Microsoft YaHei','Noto Sans CJK SC',Arial;fill:#60758D}.coreh{font:700 31px 'Microsoft YaHei','Noto Sans CJK SC',Arial;fill:#fff}.coret{font:400 21px 'Microsoft YaHei','Noto Sans CJK SC',Arial;fill:#EAF1FF}</style>
  </defs>
  <rect width="1920" height="1080" fill="#F7FAFE"/>
  <rect x="0" y="0" width="1920" height="14" fill="#4E7EFF"/>
  <text x="80" y="78" class="title">智慧文旅数字人系统 · 技术栈架构</text>
  <text x="80" y="116" class="sub">中枢式编排：交互、智能、数据和外部能力围绕同一业务核心协作</text>
  <rect x="80" y="158" width="1760" height="2" fill="#D5E0EE"/>

  <!-- top interaction domain -->
  <g filter="url(#shadow)"><rect x="680" y="205" width="560" height="188" rx="28" fill="#EAF2FF" stroke="#4E7EFF" stroke-width="2"/></g>
  <rect x="680" y="205" width="560" height="54" rx="28" fill="#4E7EFF"/><rect x="680" y="235" width="560" height="24" fill="#4E7EFF"/>
  <text x="714" y="241" class="cap">交互与展示 · Vue 单页应用</text>
  <circle cx="728" cy="303" r="11" fill="#4E7EFF"/><text x="751" y="310" class="h">Vue 3 + Vite · Vue Router · Pinia</text>
  <circle cx="728" cy="348" r="11" fill="#4E7EFF"/><text x="751" y="355" class="t">Element Plus / ECharts · Markdown 安全渲染</text>
  <circle cx="1032" cy="348" r="11" fill="#4E7EFF"/><text x="1055" y="355" class="t">Three.js + VRM 数字人</text>

  <!-- left external domain -->
  <g filter="url(#shadow)"><rect x="95" y="430" width="460" height="315" rx="28" fill="#FFF2F4" stroke="#DB4B68" stroke-width="2"/></g>
  <rect x="95" y="430" width="460" height="56" rx="28" fill="#DB4B68"/><rect x="95" y="461" width="460" height="25" fill="#DB4B68"/>
  <text x="129" y="468" class="cap">外部能力 · Provider / Strategy</text>
  <rect x="125" y="516" width="190" height="76" rx="14" fill="#fff"/><text x="150" y="551" class="h">DeepSeek</text><text x="150" y="577" class="small">证据驱动生成</text>
  <rect x="335" y="516" width="190" height="76" rx="14" fill="#fff"/><text x="360" y="551" class="h">Qwen Vision</text><text x="360" y="577" class="small">图像与视觉理解</text>
  <rect x="125" y="614" width="190" height="76" rx="14" fill="#fff"/><text x="150" y="649" class="h">百炼 ASR / TTS</text><text x="150" y="675" class="small">语音识别与播报</text>
  <rect x="335" y="614" width="190" height="76" rx="14" fill="#fff"/><text x="360" y="649" class="h">扩展能力</text><text x="360" y="675" class="small">天气 · 浏览器语音 · Mock</text>
  <text x="125" y="721" class="small">同一适配层支持云端、本地与降级实现切换</text>

  <!-- right data domain -->
  <g filter="url(#shadow)"><rect x="1365" y="430" width="460" height="315" rx="28" fill="#F4EEFF" stroke="#8958D9" stroke-width="2"/></g>
  <rect x="1365" y="430" width="460" height="56" rx="28" fill="#8958D9"/><rect x="1365" y="461" width="460" height="25" fill="#8958D9"/>
  <text x="1399" y="468" class="cap">数据与知识 · 业务持续进化</text>
  <rect x="1395" y="516" width="190" height="76" rx="14" fill="#fff"/><text x="1420" y="551" class="h">PostgreSQL</text><text x="1420" y="577" class="small">会话 · 画像 · 反馈</text>
  <rect x="1605" y="516" width="190" height="76" rx="14" fill="#fff"/><text x="1630" y="551" class="h">ChromaDB</text><text x="1630" y="577" class="small">向量索引 · 检索</text>
  <rect x="1395" y="614" width="190" height="76" rx="14" fill="#fff"/><text x="1420" y="649" class="h">知识工程</text><text x="1420" y="675" class="small">FAQ · 文档切分</text>
  <rect x="1605" y="614" width="190" height="76" rx="14" fill="#fff"/><text x="1630" y="649" class="h">本地模型</text><text x="1630" y="675" class="small">BGE · Reranker</text>
  <text x="1395" y="721" class="small">将知识、交互与运营洞察沉淀为可复用资产</text>

  <!-- central core -->
  <g filter="url(#shadow)"><rect x="640" y="450" width="640" height="290" rx="42" fill="url(#core)"/></g>
  <text x="700" y="513" class="coreh">FastAPI 模块化单体 · 业务编排中枢</text>
  <rect x="700" y="543" width="520" height="2" fill="#BFD2FF" opacity=".6"/>
  <text x="700" y="590" class="coret">API / Schema → Service → Repository / Model</text>
  <text x="700" y="631" class="coret">问答 Pipeline：FAQ → 缓存 → 混合 RAG → 生成 / 降级</text>
  <text x="700" y="672" class="coret">多模态服务：ASR · TTS · 视觉 · 情绪 · 数字人 · 推荐 · 洞察</text>
  <rect x="700" y="697" width="212" height="26" rx="13" fill="#D8E6FF" opacity=".25"/><text x="719" y="718" font-family="Microsoft YaHei,Arial" font-size="16" font-weight="700" fill="#fff">HTTP / SSE 统一协作边界</text>
  <rect x="928" y="697" width="292" height="26" rx="13" fill="#D8E6FF" opacity=".25"/><text x="946" y="718" font-family="Microsoft YaHei,Arial" font-size="16" font-weight="700" fill="#fff">配置驱动 Provider 与故障降级</text>

  <!-- connectors: independent whitespace, no labels on lines -->
  <line x1="960" y1="393" x2="960" y2="442" stroke="#637991" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="555" y1="587" x2="632" y2="587" stroke="#637991" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1365" y1="587" x2="1288" y2="587" stroke="#637991" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="974" y="428" class="small">请求 / SSE 事件</text><text x="565" y="565" class="small">Provider 适配</text><text x="1218" y="565" class="small">检索 / 持久化</text>

  <!-- foundation -->
  <g filter="url(#shadow)"><rect x="80" y="840" width="1760" height="132" rx="26" fill="url(#hero)"/></g>
  <text x="120" y="890" font-family="Microsoft YaHei,Arial" font-size="27" font-weight="700" fill="#fff">工程与运行基座</text>
  <text x="120" y="932" font-family="Microsoft YaHei,Arial" font-size="22" fill="#DDE9FF">Node.js 20+ · Python 3.13+ · npm / Vite · Uvicorn · SQLAlchemy · Alembic · pytest · CPU / PyTorch / ONNX Runtime</text>
  <text x="1400" y="891" font-family="Microsoft YaHei,Arial" font-size="21" font-weight="700" fill="#BBD3FF">设计要点</text>
  <text x="1400" y="928" font-family="Microsoft YaHei,Arial" font-size="19" fill="#DDE9FF">前端体验、智能编排、数据资产、外部能力彼此解耦</text>
</svg>
