<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#17365D" flood-opacity=".12"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#58708B"/></marker>
    <marker id="loopArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#8958D9"/></marker>
    <style>.title{font:700 46px 'Microsoft YaHei','Noto Sans CJK SC',Arial;fill:#11233F}.sub{font:400 22px 'Microsoft YaHei','Noto Sans CJK SC',Arial;fill:#5A6E87}.head{font:700 27px 'Microsoft YaHei','Noto Sans CJK SC',Arial;fill:#fff}.h{font:700 24px 'Microsoft YaHei','Noto Sans CJK SC',Arial;fill:#162B45}.t{font:400 20px 'Microsoft YaHei','Noto Sans CJK SC',Arial;fill:#344B63}.small{font:400 17px 'Microsoft YaHei','Noto Sans CJK SC',Arial;fill:#52677E}.tag{font:700 18px 'Microsoft YaHei','Noto Sans CJK SC',Arial;fill:#3C546C}.num{font:700 20px Arial;fill:#fff}</style>
  </defs>
  <rect width="1920" height="1080" fill="#F7FAFE"/><rect width="1920" height="14" fill="#8958D9"/>
  <text x="80" y="78" class="title">回答逻辑链路 · 从问题输入到知识进化的体验闭环</text>
  <text x="80" y="116" class="sub">突出“证据优先、低延迟呈现、运营反哺”三条核心逻辑</text><rect x="80" y="158" width="1760" height="2" fill="#D5E0EE"/>

  <!-- stage 1 -->
  <g filter="url(#shadow)"><rect x="65" y="260" width="270" height="470" rx="22" fill="#EAF2FF" stroke="#4E7EFF" stroke-width="2"/><rect x="65" y="260" width="270" height="68" rx="22" fill="#4E7EFF"/><rect x="65" y="306" width="270" height="22" fill="#4E7EFF"/></g>
  <circle cx="101" cy="294" r="17" fill="#fff"/><text x="94" y="301" fill="#4E7EFF" font-family="Arial" font-size="19" font-weight="700">1</text><text x="132" y="302" class="head">多模态输入</text>
  <rect x="88" y="360" width="224" height="74" rx="13" fill="#fff"/><text x="110" y="405" class="h">文字 / 快捷选项</text>
  <rect x="88" y="452" width="224" height="74" rx="13" fill="#fff"/><text x="110" y="497" class="h">语音 → ASR</text>
  <rect x="88" y="544" width="224" height="74" rx="13" fill="#fff"/><text x="110" y="589" class="h">图片 → Qwen Vision</text>
  <text x="103" y="670" class="small">不同形式，统一进入对话</text>

  <!-- stage 2 -->
  <g filter="url(#shadow)"><rect x="375" y="260" width="270" height="470" rx="22" fill="#EBFBF3" stroke="#22A36A" stroke-width="2"/><rect x="375" y="260" width="270" height="68" rx="22" fill="#22A36A"/><rect x="375" y="306" width="270" height="22" fill="#22A36A"/></g>
  <circle cx="411" cy="294" r="17" fill="#fff"/><text x="404" y="301" fill="#22A36A" font-family="Arial" font-size="19" font-weight="700">2</text><text x="442" y="302" class="head">上下文理解</text>
  <rect x="398" y="360" width="224" height="100" rx="13" fill="#fff"/><text x="420" y="398" class="h">输入标准化</text><text x="420" y="430" class="t">问题 + 多模态上下文</text>
  <rect x="398" y="480" width="224" height="154" rx="13" fill="#fff"/><text x="420" y="518" class="h">认知与个性化</text><text x="420" y="550" class="t">用户画像 · 会话历史</text><text x="420" y="582" class="t">情绪分析 · 意图识别</text><text x="420" y="614" class="t">问题改写</text>
  <text x="414" y="670" class="small">决定“怎么答”与“答什么”</text>

  <!-- stage 3 -->
  <g filter="url(#shadow)"><rect x="685" y="260" width="270" height="470" rx="22" fill="#FFF5E4" stroke="#ED970B" stroke-width="2"/><rect x="685" y="260" width="270" height="68" rx="22" fill="#ED970B"/><rect x="685" y="306" width="270" height="22" fill="#ED970B"/></g>
  <circle cx="721" cy="294" r="17" fill="#fff"/><text x="714" y="301" fill="#ED970B" font-family="Arial" font-size="19" font-weight="700">3</text><text x="752" y="302" class="head">证据优先路由</text>
  <rect x="708" y="360" width="224" height="84" rx="13" fill="#fff"/><text x="730" y="397" class="h">快速路径</text><text x="730" y="426" class="t">FAQ 语义命中 / 缓存</text>
  <rect x="708" y="462" width="224" height="112" rx="13" fill="#fff"/><text x="730" y="499" class="h">混合 RAG 检索</text><text x="730" y="529" class="t">Chroma 召回 + BM25</text><text x="730" y="558" class="t">+ Rerank</text>
  <rect x="708" y="592" width="224" height="42" rx="13" fill="#FFF8EB"/><text x="730" y="620" class="small">异常时：本地 / Stub 降级</text>
  <text x="706" y="670" class="small">证据驱动，兼顾速度与可信度</text>

  <!-- stage 4 -->
  <g filter="url(#shadow)"><rect x="995" y="260" width="270" height="470" rx="22" fill="#F4EEFF" stroke="#8958D9" stroke-width="2"/><rect x="995" y="260" width="270" height="68" rx="22" fill="#8958D9"/><rect x="995" y="306" width="270" height="22" fill="#8958D9"/></g>
  <circle cx="1031" cy="294" r="17" fill="#fff"/><text x="1024" y="301" fill="#8958D9" font-family="Arial" font-size="19" font-weight="700">4</text><text x="1062" y="302" class="head">基于证据生成</text>
  <rect x="1018" y="360" width="224" height="116" rx="13" fill="#fff"/><text x="1040" y="398" class="h">DeepSeek LLM</text><text x="1040" y="430" class="t">以检索证据为依据</text><text x="1040" y="460" class="t">组织自然语言回答</text>
  <rect x="1018" y="496" width="224" height="138" rx="13" fill="#fff"/><text x="1040" y="534" class="h">结构化输出</text><text x="1040" y="566" class="t">答案 · 来源 · 追问</text><text x="1040" y="598" class="t">表情 / 动作指令</text>
  <text x="1012" y="670" class="small">回答可解释，也能被系统消费</text>

  <!-- stage 5 -->
  <g filter="url(#shadow)"><rect x="1305" y="260" width="270" height="470" rx="22" fill="#FDEEF1" stroke="#DB4B68" stroke-width="2"/><rect x="1305" y="260" width="270" height="68" rx="22" fill="#DB4B68"/><rect x="1305" y="306" width="270" height="22" fill="#DB4B68"/></g>
  <circle cx="1341" cy="294" r="17" fill="#fff"/><text x="1334" y="301" fill="#DB4B68" font-family="Arial" font-size="19" font-weight="700">5</text><text x="1372" y="302" class="head">SSE 流式呈现</text>
  <rect x="1328" y="360" width="224" height="78" rx="13" fill="#fff"/><text x="1350" y="398" class="h">SSE Multiplexer</text><text x="1350" y="426" class="t">按会话顺序合并事件</text>
  <rect x="1328" y="456" width="224" height="84" rx="13" fill="#fff"/><text x="1350" y="492" class="h">增量对话体验</text><text x="1350" y="521" class="t">Token · 来源 · 追问</text>
  <rect x="1328" y="558" width="224" height="76" rx="13" fill="#fff"/><text x="1350" y="594" class="h">声画同步</text><text x="1350" y="622" class="t">TTS · 口型 · 表情 · 动作</text>
  <text x="1334" y="670" class="small">降低首字等待，增强沉浸感</text>

  <!-- stage 6 -->
  <g filter="url(#shadow)"><rect x="1615" y="260" width="240" height="470" rx="22" fill="#EEF2F6" stroke="#697C91" stroke-width="2"/><rect x="1615" y="260" width="240" height="68" rx="22" fill="#697C91"/><rect x="1615" y="306" width="240" height="22" fill="#697C91"/></g>
  <circle cx="1651" cy="294" r="17" fill="#fff"/><text x="1644" y="301" fill="#697C91" font-family="Arial" font-size="19" font-weight="700">6</text><text x="1682" y="302" class="head">运营改进</text>
  <rect x="1638" y="360" width="194" height="84" rx="13" fill="#fff"/><text x="1660" y="397" class="h">数据沉淀</text><text x="1660" y="426" class="t">对话 · 反馈 · 行为</text>
  <rect x="1638" y="462" width="194" height="84" rx="13" fill="#fff"/><text x="1660" y="499" class="h">管理端洞察</text><text x="1660" y="528" class="t">报告 · 情绪 · 盲区</text>
  <rect x="1638" y="564" width="194" height="70" rx="13" fill="#fff"/><text x="1660" y="600" class="h">知识更新</text><text x="1660" y="628" class="t">FAQ / 索引迭代</text>
  <text x="1641" y="670" class="small">让每次互动推动优化</text>

  <!-- main flow -->
  <line x1="335" y1="495" x2="369" y2="495" stroke="#58708B" stroke-width="4" marker-end="url(#arrow)"/><text x="330" y="238" class="tag">标准化</text>
  <line x1="645" y1="495" x2="679" y2="495" stroke="#58708B" stroke-width="4" marker-end="url(#arrow)"/><text x="634" y="238" class="tag">意图与条件</text>
  <line x1="955" y1="495" x2="989" y2="495" stroke="#58708B" stroke-width="4" marker-end="url(#arrow)"/><text x="965" y="238" class="tag">可追溯证据</text>
  <line x1="1265" y1="495" x2="1299" y2="495" stroke="#58708B" stroke-width="4" marker-end="url(#arrow)"/><text x="1265" y="238" class="tag">文本 / 表达事件</text>
  <line x1="1575" y1="495" x2="1609" y2="495" stroke="#58708B" stroke-width="4" marker-end="url(#arrow)"/><text x="1570" y="238" class="tag">反馈数据</text>

  <!-- feedback loop -->
  <path d="M1735 730 C1735 790, 1095 790, 820 790 C780 790, 760 775, 760 764" fill="none" stroke="#8958D9" stroke-width="4" stroke-dasharray="12 10" marker-end="url(#loopArrow)"/>
  <rect x="1020" y="822" width="420" height="54" rx="27" fill="#F4EEFF" stroke="#8958D9" stroke-width="2"/><text x="1054" y="858" font-family="Microsoft YaHei,Arial" font-size="21" font-weight="700" fill="#5A348F">运营洞察反哺知识库，提升下次检索</text>

  <g filter="url(#shadow)"><rect x="80" y="925" width="1760" height="92" rx="22" fill="#17365D"/></g>
  <text x="116" y="963" font-family="Microsoft YaHei,Arial" font-size="24" font-weight="700" fill="#fff">链路设计原则</text>
  <text x="360" y="963" font-family="Microsoft YaHei,Arial" font-size="21" fill="#D9E7FF">① 证据先于生成，保障可信度</text>
  <text x="830" y="963" font-family="Microsoft YaHei,Arial" font-size="21" fill="#D9E7FF">② LLM 与流式 TTS 并行，降低等待</text>
  <text x="1330" y="963" font-family="Microsoft YaHei,Arial" font-size="21" fill="#D9E7FF">③ 反馈反哺知识，持续提升体验</text>
</svg>
