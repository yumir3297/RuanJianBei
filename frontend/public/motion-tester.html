function lerpKeys(keys, t) {
  if (keys.length === 0) return {};
  if (t <= keys[0].t) return { ...keys[0] };
  for (let i = keys.length - 1; i >= 0; i--) {
    if (t >= keys[i].t) {
      if (i === keys.length - 1) return { ...keys[i] };
      const next = keys[i + 1];
      const prev = keys[i];
      const seg = next.t - prev.t;
      const lt = seg > 0 ? (t - prev.t) / seg : 0;
      const eased = lt < 0.5 ? 2 * lt * lt : 1 - Math.pow(-2 * lt + 2, 2) / 2;
      const r = {};
      for (const k of Object.keys(prev)) {
        if (k === "t") continue;
        r[k] = (prev[k] || 0) + ((next[k] || 0) - (prev[k] || 0)) * eased;
      }
      return r;
    }
  }
  return { ...keys[0] };
}

function initRenderer() {
  const wrapper = document.querySelector(".canvas-wrapper");
  renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.05;
  wrapper.appendChild(renderer.domElement);

  scene = new THREE.Scene();
  scene.background = null;
  scene.fog = new THREE.FogExp2(0x0f172a, 0.00015);
  camera = new THREE.PerspectiveCamera(28, 380 / 440, 0.8, 20);
  camera.position.set(0, 1.0, 4.8);
  camera.lookAt(0, 1.0, 0);

  scene.add(new THREE.AmbientLight(0x404060, 0.6));
  const key = new THREE.DirectionalLight(0xffeedd, 2.0);
  key.position.set(3, 2, 5);
  scene.add(key);
  const fill = new THREE.DirectionalLight(0x8899cc, 0.7);
  fill.position.set(-2, 0.5, 2);
  scene.add(fill);
  const rim = new THREE.PointLight(0xff9966, 1.5, 8);
  rim.position.set(0, 2.5, -2);
  scene.add(rim);

  // Particles
  const particleCount = 100;
  const particleGeo = new THREE.BufferGeometry();
  const positions = new Float32Array(particleCount * 3);
  const colors = new Float32Array(particleCount * 3);
  for (let i = 0; i < particleCount; i++) {
    positions[i * 3] = (Math.random() - 0.5) * 5;
    positions[i * 3 + 1] = Math.random() * 4 - 0.5;
    positions[i * 3 + 2] = (Math.random() - 0.5) * 4;
    colors[i * 3] = 0.2 + Math.random() * 0.3;
    colors[i * 3 + 1] = 0.4 + Math.random() * 0.4;
    colors[i * 3 + 2] = 0.5 + Math.random() * 0.5;
  }
  particleGeo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
  particleGeo.setAttribute("color", new THREE.BufferAttribute(colors, 3));
  const particleMat = new THREE.PointsMaterial({
    size: 0.025,
    vertexColors: true,
    transparent: true,
    opacity: 0.6,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  particles = new THREE.Points(particleGeo, particleMat);
  scene.add(particles);

  timer = new THREE.Timer();
}

function resize() {
  if (!renderer || !camera) return;
  const wrapper = document.querySelector(".canvas-wrapper");
  if (!wrapper) return;
  const w = wrapper.clientWidth;
  const h = wrapper.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener("resize", resize);

function saveRestPose() {
  if (!vrm || !vrm.humanoid) { savedRest = null; return; }
  savedRest = {};
  const bones = ["head","spine","rightUpperArm","leftUpperArm","rightLowerArm","leftLowerArm","rightHand","leftHand"];
  for (const name of bones) {
    const bone = vrm.humanoid.getNormalizedBoneNode(name);
    if (bone) savedRest[name] = { x: bone.rotation.x, y: bone.rotation.y, z: bone.rotation.z };
  }
}

function restoreRestPose() {
  if (!vrm || !savedRest) return;
  for (const [name, rot] of Object.entries(savedRest)) {
    const bone = vrm.humanoid?.getNormalizedBoneNode(name);
    if (bone) { bone.rotation.x = rot.x; bone.rotation.y = rot.y; bone.rotation.z = rot.z; }
  }
}

function setVrmExpression(parts, name, value) {
  if (parts.__avatarKind !== "vrm" || !parts.__vrm?.expressionManager) return;
  parts.__vrm.expressionManager.setValue(name, THREE.MathUtils.clamp(value, 0, 1));
}

function applyExpressions(template, progress) {
  if (!vrm?.expressionManager || !template.expressions) return;
  for (const exp of template.expressions) {
    if (Math.abs(progress - exp.at) < 0.025) {
      vrm.expressionManager.setValue(exp.name, THREE.MathUtils.clamp(exp.value, 0, 1));
    }
  }
}

function resetAllExpressions() {
  if (!vrm?.expressionManager) return;
  ["happy","angry","sad","relaxed","surprised","neutral","blink"].forEach(n => vrm.expressionManager.setValue(n, 0));
}

function applyMotionBones(keyframes, t, blend, scale) {
  if (!savedRest) return;
  const values = lerpKeys(keyframes, t);
  const accum = {};
  for (const [key, val] of Object.entries(values)) {
    if (key === "t") continue;
    const boneName = BONE_MAP[key];
    if (!boneName) continue;
    const parts = key.split("_");
    if (parts.length !== 2) continue;
    const axis = parts[1];
    if (!accum[boneName]) accum[boneName] = { x: null, y: null, z: null };
    accum[boneName][axis] = val * scale;
  }
  for (const [boneName, rot] of Object.entries(accum)) {
    if (boneName === "__group_y") {
      if (avatarGroup && rot.y !== null) {
        avatarGroup.rotation.y = 0 + (rot.y - 0) * blend;
      }
      continue;
    }
    const bone = vrm?.humanoid?.getNormalizedBoneNode(boneName);
    if (!bone) continue;
    const rest = savedRest[boneName];
    if (!rest) continue;
    if (rot.x !== null) bone.rotation.x = rest.x + (rot.x - rest.x) * blend;
    if (rot.y !== null) bone.rotation.y = rest.y + (rot.y - rest.y) * blend;
    if (rot.z !== null) bone.rotation.z = rest.z + (rot.z - rest.z) * blend;
  }
}

function startMotion(name) {
  const template = MOTION_TEMPLATES[name];
  if (!template) return;
  if (currentModel === "procedural" && name !== "lean_in") {
    setStatus("程序化模型无四肢骨骼，仅支持侧耳倾听");
    return;
  }
  resetAllExpressions();
  saveRestPose();
  motion = {
    name,
    startTime: performance.now(),
    duration: template.duration / userSpeed,
    blendIn: template.blendIn / userSpeed,
    blendOut: template.blendOut / userSpeed,
    keyframes: template.keyframes,
    expressions: template.expressions,
  };
  updateMotionButtons(name);
}

function playbackMotion() {
  if (!motion) return;
  const elapsed = performance.now() - motion.startTime;
  const total = motion.duration;
  const progress = Math.min(elapsed / total, 1);

  let blend = 1;
  const bi = motion.blendIn / total;
  const bo = 1 - motion.blendOut / total;
  if (progress < bi) blend = progress / bi;
  else if (progress > bo) blend = (1 - progress) / (1 - bo);

  if (progress >= 1) {
    restoreRestPose();
    if (avatarGroup) avatarGroup.rotation.y = 0;
    resetAllExpressions();
    setStatus("就绪");
    motion = null;
    updateMotionButtons(null);
    return;
  }

  applyMotionBones(motion.keyframes, progress, blend, userScale);
  applyExpressions(motion, progress);
  setStatus(`播放中: ${motion.name} — ${Math.round(progress * 100)}%`, true);
}

function animate() {
  animId = requestAnimationFrame(animate);
  timer.update();
  const dt = Math.min(timer.getDelta(), 0.1);
  const t = performance.now() * 0.001;

  if (mixamoPlaying && currentMixamoSamples) {
    const elapsed = (performance.now() - mixamoStartTime) / 1000;
    if (elapsed >= mixamoDuration + 0.1) {
      stopMixamo();
      setStatus("就绪");
    } else {
      const t = elapsed / mixamoDuration;
      const tmpQ = new THREE.Quaternion();
      for (const sample of currentMixamoSamples) {
        const times = sample.times;
        const vals = sample.values;
        const nk = times.length;
        if (nk === 0) continue;
        let idx = 0;
        for (let i = nk - 1; i >= 0; i--) {
          if (t * mixamoDuration >= times[i]) { idx = i; break; }
        }
        if (idx >= nk - 1) {
          tmpQ.set(vals[(nk - 1) * 4], vals[(nk - 1) * 4 + 1], vals[(nk - 1) * 4 + 2], vals[(nk - 1) * 4 + 3]);
        } else {
          const lt = (t * mixamoDuration - times[idx]) / (times[idx + 1] - times[idx] || 0.001);
          const a = idx * 4;
          const b = (idx + 1) * 4;
          tmpQ.set(
            vals[a] + (vals[b] - vals[a]) * lt,
            vals[a + 1] + (vals[b + 1] - vals[a + 1]) * lt,
            vals[a + 2] + (vals[b + 2] - vals[a + 2]) * lt,
            vals[a + 3] + (vals[b + 3] - vals[a + 3]) * lt,
          ).normalize();
        }
        sample.bone.quaternion.copy(tmpQ);
      }
      setStatus("播放 Mixamo — " + elapsed.toFixed(1) + "s", true);
    }
  } else {
    playbackMotion();
  }

  // Particles
  if (particles) {
    const pos = particles.geometry.attributes.position.array;
    for (let i = 0; i < pos.length / 3; i++) {
      pos[i * 3 + 1] += (Math.sin(t * 2 + i) * 0.002) * dt * 10;
      if (pos[i * 3 + 1] > 3) pos[i * 3 + 1] = -1;
    }
    particles.geometry.attributes.position.needsUpdate = true;
    particles.rotation.y += dt * 0.03;
  }

  vrm?.update(dt);
  renderer.render(scene, camera);
}

function setStatus(msg, active = false) {
  const bar = document.getElementById("statusBar");
  bar.textContent = msg;
  bar.className = active ? "status active" : "status";
}

function updateMotionButtons(activeName) {
  document.querySelectorAll("#motionGrid .motion-btn").forEach(btn => {
    btn.classList.toggle("playing", btn.dataset.motion === activeName);
  });
}

// ---------------- Model Loading ----------------
let isLoading = false;

async function loadVRM(url) {
  if (isLoading) return;
  isLoading = true;

  resetAllExpressions();
  motion = null;
  savedRest = null;
  updateMotionButtons(null);
  setStatus("加载中...", false);
  const loadingMsg = document.getElementById("loadingMsg");
  if (loadingMsg) loadingMsg.style.display = "block";

  if (avatarGroup) {
    scene.remove(avatarGroup);
    avatarGroup.traverse(node => {
      if (node.isMesh) {
        node.geometry?.dispose();
        const mats = Array.isArray(node.material) ? node.material : [node.material];
        mats.forEach(m => { Object.values(m).forEach(v => { if (v?.isTexture) v.dispose(); }); m.dispose?.(); });
      }
    });
    avatarGroup = null;
  }
  vrm = null;
  savedRest = null;

  if (!url) {
    avatarGroup = new THREE.Group();
    scene.add(avatarGroup);
    if (loadingMsg) loadingMsg.style.display = "none";
    setStatus("程序化模式 — 无动作骨骼");
    isLoading = false;
    return;
  }

  const loader = new GLTFLoader();
  loader.register(parser => new VRMLoaderPlugin(parser));
  const gltf = await loader.loadAsync(url);
  const model = gltf.userData.vrm;
  if (!model) throw new Error("无VRM数据");

  VRMUtils.rotateVRM0(model);
  VRMUtils.removeUnnecessaryVertices(model.scene);

  const box = new THREE.Box3().setFromObject(model.scene);
  const size = new THREE.Vector3();
  box.getSize(size);
  const scaleVal = 3.9 / Math.max(size.y, 0.001);
  model.scene.scale.setScalar(scaleVal);
  const center = new THREE.Vector3();
  box.setFromObject(model.scene).getCenter(center);
  model.scene.position.x -= center.x;
  model.scene.position.y += -box.min.y - 1.9;

  avatarGroup = new THREE.Group();
  avatarGroup.add(model.scene);
  scene.add(avatarGroup);

  vrm = model;
  if (loadingMsg) loadingMsg.style.display = "none";
  setStatus("就绪");

  const humanoid = model.humanoid;
  if (humanoid) {
    const lua = humanoid.getNormalizedBoneNode("leftUpperArm");
    const rua = humanoid.getNormalizedBoneNode("rightUpperArm");
    const lla = humanoid.getNormalizedBoneNode("leftLowerArm");
    const rla = humanoid.getNormalizedBoneNode("rightLowerArm");
    if (lua) { lua.rotation.x = 0; lua.rotation.y = 0; lua.rotation.z = -0.35; }
    if (rua) { rua.rotation.x = 0; rua.rotation.y = 0; rua.rotation.z = 0.35; }
    if (lla) { lla.rotation.x = 0; lla.rotation.y = 0; lla.rotation.z = 0; }
    if (rla) { rla.rotation.x = 0; rla.rotation.y = 0; rla.rotation.z = 0; }
  }

  model.springBoneManager?.reset();
  model.update(0);
  saveRestPose();
  isLoading = false;
}

async function switchModel(key) {
  if (isLoading || currentModel === key) return;
  currentModel = key;
  document.querySelectorAll(".model-select button").forEach(b => b.classList.toggle("active", b.dataset.model === key));
  await loadVRM(MODEL_URLS[key]);
}

function setMixamoBtnActive(activeBtn) {
  document.querySelectorAll("#mixamoGrid .motion-btn").forEach(b => b.classList.remove("playing"));
  if (activeBtn) activeBtn.classList.add("playing");
}

function stopMixamo() {
  if (!currentMixamoSamples) return;
  for (const s of currentMixamoSamples) { if (s.restRot) s.bone.quaternion.copy(s.restRot); }
  mixamoPlaying = false;
  setMixamoBtnActive(null);
  saveRestPose();
}

window.playMixamoFile = async function(btnEl) {
  const file = btnEl.dataset.file;
  if (!file) return;
  if (mixamoPlaying) return;
  if (!vrm?.humanoid) { setStatus("请先加载 VRM 模型"); return; }

  if (motion) {
    restoreRestPose(); if (avatarGroup) avatarGroup.rotation.y = 0;
    resetAllExpressions(); motion = null; updateMotionButtons(null);
  }

  const glbUrl = "/motions/" + encodeURI(file) + "?nocache=" + Date.now();
  setStatus(`加载 ${file} ...`);
  const resp = await fetch(glbUrl);
  if (!resp.ok) { setStatus(`HTTP ${resp.status}: ${file}`); return; }
  const buffer = await resp.arrayBuffer();
  console.log(`[${file}] 文件大小: ${buffer.byteLength} 字节`);

  const loader = new GLTFLoader();
  const gltf = await new Promise((ok, fail) => loader.parse(buffer.slice(0), "", ok, fail));
  if (!gltf.animations?.length) { setStatus("无动画: " + file); return; }

  const clip = gltf.animations[0];
  const samples = [];
  for (const track of clip.tracks) {
    const parts = track.name.split(".");
    const vrmName = MIXAMO_TO_VRM_BONES[parts[0]];
    if (!vrmName) continue;
    const bone = vrm.humanoid.getNormalizedBoneNode(vrmName);
    if (!bone) continue;

    if (parts[1] === "quaternion") {
      samples.push({ bone, times: new Float32Array(track.times), values: new Float32Array(track.values) });
    } else if (parts[1] === "rotation") {
      // 欧拉角→四元数转换
      const nk = track.times.length;
      const quatVals = new Float32Array(nk * 4);
      const euler = new THREE.Euler();
      const tmpQ = new THREE.Quaternion();
      for (let i = 0; i < nk; i++) {
        euler.set(
          THREE.MathUtils.degToRad(track.values[i * 3]),
          THREE.MathUtils.degToRad(track.values[i * 3 + 1]),
          THREE.MathUtils.degToRad(track.values[i * 3 + 2]),
        );
        tmpQ.setFromEuler(euler);
        quatVals[i * 4] = tmpQ.x;
        quatVals[i * 4 + 1] = tmpQ.y;
        quatVals[i * 4 + 2] = tmpQ.z;
        quatVals[i * 4 + 3] = tmpQ.w;
      }
      samples.push({ bone, times: new Float32Array(track.times), values: quatVals });
    }
  }

  if (samples.length === 0) { setStatus("无匹配骨骼: " + file); return; }

  const boneNames = samples.map(s => s.bone.name || "(unknown)").join(", ");
  const raSample = samples.find(s => {
    const n = (s.bone.name || "").toLowerCase();
    return n.includes("r") && n.includes("upper") && n.includes("arm");
  });
  const midIdx = raSample ? Math.floor(raSample.times.length * 0.5) : -1;
  const midVals = raSample && midIdx >= 0 ? `[${raSample.values[midIdx*4].toFixed(3)},${raSample.values[midIdx*4+1].toFixed(3)},${raSample.values[midIdx*4+2].toFixed(3)},${raSample.values[midIdx*4+3].toFixed(3)}]` : "N/A";
  console.log(`[${file}] 大小=${buffer.byteLength}B | 时长=${clip.duration.toFixed(1)}s | 骨骼=${samples.length}根 | RightArm@50%=${midVals}`);
  console.log(`  骨骼名: ${boneNames}`);

  saveRestPose();
  for (const s of samples) s.restRot = s.bone.quaternion.clone();

  currentMixamoSamples = samples;
  mixamoDuration = clip.duration;
  mixamoPlaying = true;
  mixamoStartTime = performance.now();

  setMixamoBtnActive(btnEl);
  setStatus(`播放: ${file} (${clip.duration.toFixed(1)}s)`, true);
};

window.switchModel = switchModel;

window.playMotion = (name) => {
  if (motion && motion.name === name) return;
  if (mixamoPlaying) { stopMixamo(); }
  if (motion) { restoreRestPose(); if (avatarGroup) avatarGroup.rotation.y = 0; resetAllExpressions(); }
  startMotion(name);
};

window.updateScale = () => {
  userScale = parseFloat(document.getElementById("scaleSlider").value);
  document.getElementById("scaleVal").textContent = userScale.toFixed(2);
};

window.updateSpeed = () => {
  userSpeed = parseFloat(document.getElementById("speedSlider").value);
  document.getElementById("speedVal").textContent = userSpeed.toFixed(2);
};

// ---------------- Init ----------------
initRenderer();
resize();
animate();
await loadVRM("/models/hanfu.vrm");
</script>
